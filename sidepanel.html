<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chroplus AI Chat</title>
    <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <button id="settings-btn" class="icon-btn" title="设置">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
            <h1 class="title">Chroplus AI</h1>
            <button id="clear-btn" class="icon-btn" title="清空对话">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
            </button>
        </header>

        <!-- Chat View -->
        <main id="chat-view" class="view">
            <div id="messages" class="messages">
                <!-- Messages will be rendered here -->
            </div>
            <div class="input-area">
                <textarea id="user-input" placeholder="输入消息..." rows="1"></textarea>
                <button id="send-btn" class="send-btn" title="发送">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </main>

        <!-- Settings View -->
        <div id="settings-view" class="view hidden">
            <div class="settings-header">
                <button id="back-btn" class="icon-btn" title="返回">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </button>
                <h2 class="settings-title">设置</h2>
            </div>
            <div class="settings-content">
                <div class="setting-item">
                    <label class="setting-label">Gemini API Key</label>
                    <div class="api-key-input">
                        <input type="password" id="api-key-input" placeholder="输入你的 API Key">
                        <button id="toggle-key-btn" class="icon-btn" title="显示/隐藏">
                            <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    <p class="setting-hint">
                        如何获取 API Key？
                        <a href="https://aistudio.google.com/app/apikey" target="_blank" class="help-link">查看教程 →</a>
                    </p>
                </div>
                <div class="setting-item">
                    <label class="setting-label">当前模型</label>
                    <p class="setting-value">gemini-2.5-flash-preview</p>
                </div>
                <div class="settings-actions">
                    <button id="cancel-settings-btn" class="btn btn-secondary">取消</button>
                    <button id="save-settings-btn" class="btn btn-primary">保存</button>
                </div>
            </div>
        </div>

        <!-- Error Toast -->
        <div id="error-toast" class="toast hidden">
            <span id="error-message"></span>
        </div>
    </div>
    <script src="sidepanel.js"></script>
</body>
</html>
